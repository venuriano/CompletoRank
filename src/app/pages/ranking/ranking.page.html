<ion-header>
  <ion-toolbar>
    <ion-title>Ranking</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-list>

    <ion-item *ngFor="let local of ranking">

      <ion-label>
        {{ local.nombre }}
      </ion-label>

      <ion-badge color="success">
        {{ local.nota }}
      </ion-badge>

    </ion-item>

  </ion-list>

</ion-content>

<ion-button
expand="block"
routerLink="/home">

Volver al Inicio

</ion-button>
